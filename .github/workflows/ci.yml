name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip pytest
      - run: python -m pip install -e .
      - run: python -m compileall gemini_insights
      - run: gemini-insights --version
      - run: python -m pytest -q

  # Secondary gate: assert the published screenshot data path never contains
  # tokens we promised to keep out. Anything matching the regex fails CI.
  demo-pii-guard:
    name: Demo PII guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Render demo report and check for forbidden tokens
        # Single source of truth: gemini_insights.demo.FORBIDDEN_DEMO_TOKENS.
        # The same list is checked by tests/test_render.py so the two
        # gates cannot drift apart.
        run: |
          gemini-insights demo --output /tmp/demo.html --no-open
          python - <<'PY'
          import re, sys
          from gemini_insights.demo import FORBIDDEN_DEMO_TOKENS
          html = open('/tmp/demo.html', encoding='utf-8').read()
          pattern = re.compile('(?:' + '|'.join(re.escape(t) for t in FORBIDDEN_DEMO_TOKENS) + ')', re.IGNORECASE)
          m = pattern.search(html)
          if m:
              print(f'::error::demo.html contains a forbidden token: {m.group(0)!r}')
              sys.exit(1)
          print(f'OK — checked {len(FORBIDDEN_DEMO_TOKENS)} forbidden tokens.')
          PY

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7
